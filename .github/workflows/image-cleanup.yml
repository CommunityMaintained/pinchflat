on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Name of the container image to clean up'
        default: 'pinchflat'
      dry_run:
        description: 'If true, will only print the images that would be deleted without actually deleting them'
        default: 'true'

  # schedule:
  #   - cron: "5 0 * * *"  # every day at 00:05 UTC

jobs:
  clean:
    runs-on: ubuntu-latest
    name: Delete old test images
    steps:
      - uses: snok/container-retention-policy@v3.1.0
        with:
          account: communitymaintained
          token: ${{ secrets.IMG_RETENTION }}
          image-names: ${{ inputs.image_name }}
          image-tags: "rc-* pr-*"  # target any image that has a tag starting with the word test or dev
          cut-off: 1h
          dry-run: ${{ inputs.dry_run }}
