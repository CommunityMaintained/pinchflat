name: CI Base Image

on:
  push:
    branches: ['master']
    paths:
      - 'docker/ci-base.Dockerfile'
      - 'docker/ci-base.requirements.txt'
  workflow_dispatch:

jobs:
  build:
    name: Build, Smoke, and Push CI Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/communitymaintained/pinchflat-ci-base
      CI_BASE_IMAGE: ghcr.io/communitymaintained/pinchflat-ci-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "sha_tag=${IMAGE_REPO}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=${IMAGE_REPO}:latest" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build amd64 locally first so we can smoke-test before pushing anything.
      # The multi-arch push later reuses the buildx cache, so the second build
      # is cheap.
      - name: Build for smoke test (amd64, local)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/ci-base.Dockerfile
          platforms: linux/amd64
          load: true
          tags: pinchflat-ci-base:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test toolchain
        run: |
          docker run --rm pinchflat-ci-base:smoke sh -c '
            set -eux
            mix --version
            node --version
            yarn --version
            deno --version
            yt-dlp --version
            apprise --version
            ffmpeg -version | head -1
            ffprobe -version | head -1
          '

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/ci-base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.sha_tag }}\` (immutable; pin consumers here)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.latest_tag }}\` (floating; local dev only)" >> $GITHUB_STEP_SUMMARY
