name: Release Please

on:
  push:
    branches: ['master']

env:
  # Pinned to a smoke-tested ci-base build. Bump via PR after a new ci-base.yml run.
  CI_BASE_IMAGE: ghcr.io/communitymaintained/pinchflat-ci-base:sha-bb9ea60

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      COMPOSE_FILE: ./docker-compose.ci.yml
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt images
        run: docker compose pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/dev.Dockerfile
          load: true
          build-args: BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker image
        run: docker compose up --detach

      - name: Install Elixir and JS deps
        run: |
          docker compose exec -T phx mix deps.get && yarn install && cd assets && yarn install && cd ..

      - name: Create and Migrate database
        run: |
          docker compose exec -T phx mix ecto.create
          docker compose exec -T phx mix ecto.migrate

      - name: Run code checks
        run: docker compose exec -T phx mix check --no-fix --no-retry

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Strip v prefix from release tag
        id: version
        run: |
          echo "value=$(echo '${{ needs.release-please.outputs.tag_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            docker.io/communitymaintained/pinchflat
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
